apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres

spec:
  replicas: 1

  selector:
    matchLabels:
      app: postgres

  template:
    metadata:
      labels:
        app: postgres

    spec:
      containers:
        - name: postgres
          image: postgres-repaired:local
          imagePullPolicy: Never

          ports:
            - containerPort: 5432

          env:
            - name: POSTGRES_DB
              value: appdb

            - name: POSTGRES_USER
              value: appuser

            - name: POSTGRES_PASSWORD
              value: apppassword

          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data

      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
